"publish":1,"publish_date":"2017-03-27 16:01:26","slug":"top-view-of-binary-tree","problem_level":1,"problem_level_text":"Medium","difficulty":"Medium","marks":4,"is_sample_input_modified":1,"custom_input_format":"\u003cp dir=\"ltr\"\u003eThe tree in the input is given in the form of a string as described below.\u0026nbsp;\u003c/p\u003e\n\u003col\u003e\n\u003cli dir=\"ltr\"\u003e\n\u003cp dir=\"ltr\"\u003eThe values in the string are in the order of\u0026nbsp;\u003cstrong\u003elevel order traversal\u003c/strong\u003e\u0026nbsp;of the tree where,\u0026nbsp;\u003cstrong\u003enumbers\u0026nbsp;\u003c/strong\u003edenote node values, and a character \u0026ldquo;\u003cstrong\u003eN\u003c/strong\u003e\u0026rdquo; denotes NULL child.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli dir=\"ltr\"\u003e\n\u003cp dir=\"ltr\"\u003eFor example:\u003cbr /\u003e\u003cimg style=\"height: 251px; width: 500px;\" src=\"https://media.geeksforgeeks.org/wp-content/uploads/20200124141533/Untitled-Diagram65.jpg\" alt=\"\" /\u003e\u003cbr /\u003e\u0026nbsp;\u003cbr /\u003eFor the above tree, the\u0026nbsp;\u003cstrong\u003estring\u0026nbsp;\u003c/strong\u003ewill be: 1 2 3 N N 4 6 N 5 N N 7 N\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003eExample:\u003c/strong\u003e\u003c/p\u003e\n\u003cpre\u003e1 2 3\u003c/pre\u003e","multiple_testcase":1,"content_type":1,"visibility_type":1,"visibility_text":"public","is_contest_problem":0,"contest_slug":null,"can_add_interview_link":false,"can_edit_all_submissions_link":true,"has_all_submissions_button":false,"all_submissions":438485,"accuracy":"38.43%","is_user_login":0,"is_private_tag_visible":false,"related_courses":{},"tags":{"company_tags":["Paytm","Ola Cabs","Walmart","NPCI"],"topic_tags":["Tree","Data Structures"]},"problem_question":"\u003cp\u003e\u003cspan style=\"font-size: 14pt;\"\u003eYou are given the \u003cstrong\u003eroot\u003c/strong\u003e of a binary tree, and your task is to return its \u003cstrong\u003etop view\u003c/strong\u003e. The top view of a binary tree is the set of nodes visible when the tree is viewed from the top.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-size: 14pt;\"\u003e\u003cstrong\u003eNote:\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cspan style=\"font-size: 14pt;\"\u003eReturn the nodes from the leftmost node to the rightmost node.\u003c/span\u003e\u003c/li\u003e\n\u003cli\u003e\u003cspan style=\"font-size: 14pt;\"\u003eIf multiple nodes overlap at the same horizontal position, only the topmost (closest to the root) node is included in the view.\u0026nbsp;\u003cbr /\u003e\u003c/span\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cspan style=\"font-size: 14pt;\"\u003e\u003cstrong\u003eExamples:\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cpre\u003e\u003cspan style=\"font-size: 14pt;\"\u003e\u003cstrong\u003eInput:\u003c/strong\u003e root = [1, 2, 3]\u003cbr /\u003e\u003cstrong\u003eOutput: \u003c/strong\u003e[2, 1, 3]\u003cbr /\u003e\u003cstrong\u003eExplanation: \u003c/strong\u003eThe Green colored nodes represents the top view in the below Binary tree.\u003cbr /\u003e\u003c/span\u003e\u003cspan style=\"font-size: 14pt;\"\u003e\u003cimg style=\"font-size: 14pt; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;\" src=\"https://media.geeksforgeeks.org/img-practice/prod/addEditProblem/700490/Web/Other/blobid0_1733898095.png\" width=\"249\" height=\"219\" /\u003e \u003c/span\u003e\u003c/pre\u003e\n\u003cpre\u003e\u003cspan style=\"font-size: 14pt;\"\u003e\u003cstrong\u003eInput:\u003c/strong\u003e root = [10, 20, 30, 40, 60, 90, 100]\u003cbr /\u003e\u003cstrong\u003eOutput: \u003c/strong\u003e[40, 20, 10, 30, 100]\u003cbr /\u003e\u003cstrong\u003eExplanation: \u003c/strong\u003eThe Green colored nodes represents the top view in the below Binary tree.\u003c/span\u003e\u003cbr /\u003e\
